[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 10000
via_ir = false
evm_version = "paris"
solc_version = "0.8.28"
gas_reports = ["OmniShieldEscrow", "StealthPayment", "YieldRouter"]
ffi = false
ast = true
build_info = true
extra_output = ["abi", "evm.bytecode"]

[profile.default.fmt]
bracket_spacing = false
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

[profile.ci]
fuzz = { runs = 10000, max_test_rejects = 100000 }
invariant = { runs = 256, depth = 128 }

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 64
depth = 64

[rpc_endpoints]
polkadot_hub_testnet = "https://eth-rpc-testnet.polkadot.io/"
polkadot_hub_mainnet = "${POLKADOT_HUB_MAINNET_RPC}"
localhost = "http://127.0.0.1:8545"

# Routescan verification (requires API key from https://polkadothub.routescan.io/)
[etherscan]
polkadot-testnet = { key = "${EXPLORER_API_KEY}", url = "https://api.routescan.io/v2/network/testnet/evm/420420417/etherscan/api?" }
